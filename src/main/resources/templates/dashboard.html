<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen">
    <nav class="bg-white shadow-sm border-b border-gray-200">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex-shrink-0 flex items-center">
                    <span class="text-xl font-bold text-blue-600">EmployeeApp</span>
                </div>
                <div class="flex items-center space-x-4">
                    <span class="text-gray-600 font-medium">
                        Welcome, <span sec:authentication="name" class="text-gray-900 font-bold"></span>!
                    </span>
                    <form th:action="@{/logout}" method="post" class="m-0">
                        <button type="submit" class="text-sm font-semibold text-red-500 hover:text-red-700 transition">Logout</button>
                    </form>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-8 text-center max-w-2xl mx-auto">
            <h2 class="text-3xl font-bold text-gray-900 mb-4">Dashboard Overview</h2>
            <p class="text-gray-500 mb-8">Manage your workforce efficiently. Choose an action below to get started.</p>
            
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <a th:href="@{/employees}" class="group block p-6 bg-gray-50 rounded-lg border border-gray-200 hover:border-blue-500 hover:bg-blue-50 transition duration-150">
                    <h3 class="text-lg font-semibold text-gray-900 group-hover:text-blue-700">View All Employees</h3>
                    <p class="text-sm text-gray-500 mt-2">Browse, search, and manage your current staff directory.</p>
                </a>
                
                <a th:href="@{/employees/add}" class="group block p-6 bg-gray-50 rounded-lg border border-gray-200 hover:border-blue-500 hover:bg-blue-50 transition duration-150">
                    <h3 class="text-lg font-semibold text-gray-900 group-hover:text-blue-700">Add Employee</h3>
                    <p class="text-sm text-gray-500 mt-2">Onboard a new team member and add them to the system.</p>
                </a>
            </div>
        </div>
    </div>
</body>
</html>
