<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Employees</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans p-8">
    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-3xl font-bold text-gray-900">All Employees</h2>
            <div class="space-x-4">
                <a th:href="@{/dashboard}" class="text-gray-500 hover:text-gray-700 font-medium">← Back</a>
                <a th:href="@{/employees/add}" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-lg shadow-sm transition duration-150">+ Add New</a>
            </div>
        </div>

        <div class="bg-white shadow-md rounded-lg overflow-hidden">
            <table class="min-w-full text-left text-sm whitespace-nowrap">
                <thead class="bg-gray-100 uppercase tracking-wider text-gray-600 font-semibold border-b">
                    <tr>
                        <th class="px-6 py-4">ID</th>
                        <th class="px-6 py-4">First</th>
                        <th class="px-6 py-4">Last</th>
                        <th class="px-6 py-4">Email</th>
                        <th class="px-6 py-4">Department</th>
                        <th class="px-6 py-4">Salary</th>
                        <th class="px-6 py-4 text-center">Action</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-gray-200">
                    <tr th:each="emp : ${employees}" class="hover:bg-gray-50 transition duration-150">
                        <td class="px-6 py-4 font-medium text-gray-900" th:text="${emp.id}"></td>
                        <td class="px-6 py-4" th:text="${emp.firstName}"></td>
                        <td class="px-6 py-4" th:text="${emp.lastName}"></td>
                        <td class="px-6 py-4 text-blue-600" th:text="${emp.email}"></td>
                        <td class="px-6 py-4">
                            <span class="bg-blue-100 text-blue-800 text-xs font-semibold px-2.5 py-0.5 rounded" th:text="${emp.department}"></span>
                        </td>
                        <td class="px-6 py-4 font-mono text-gray-700" th:text="'$' + ${emp.salary}"></td>
                        <td class="px-6 py-4 text-center">
                            <a th:href="@{/employees/delete/{id}(id=${emp.id})}" class="text-red-500 hover:text-red-700 font-medium">Delete</a>
                        </td>
                    </tr>
                </tbody>
            </table>
            
            <div th:if="${#lists.isEmpty(employees)}" class="p-8 text-center text-gray-500">
                No employees found. Click "Add New" to get started.
            </div>
        </div>
    </div>
</body>
</html>
